name: SEO Agent — Benchmark de la mañana

on:
  schedule:
    - cron: '0 11 * * *'   # 11:00 UTC = 06:00 AM Lima (UTC-5)
  workflow_dispatch:

jobs:
  morning:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Run morning benchmark
        env:
          MARFEEL_EMAIL:        ${{ secrets.MARFEEL_EMAIL }}
          MARFEEL_PASSWORD:     ${{ secrets.MARFEEL_PASSWORD }}
          GSC_CREDENTIALS_JSON: ${{ secrets.GSC_CREDENTIALS_JSON }}
          SERPAPI_KEY:          ${{ secrets.SERPAPI_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:         ${{ secrets.SUPABASE_KEY }}
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION:            ${{ secrets.AWS_REGION }}
          BEDROCK_MODEL_ID:      ${{ secrets.BEDROCK_MODEL_ID }}
          TZ: America/Lima
        run: |
          cd agent
          python run_morning.py
